services:
  - type: web
    name: marshallbot-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    preDeployCommand: python -m app.db.apply_schema
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: marshallbot-worker
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: marshallbot-beat
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: ENVIRONMENT
        value: production
